
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Please sign in</title>
    <link th:href="@{/default-ui.css}" rel="stylesheet" />
</head>
<body>
<div class="content">
    <form class="login-form" th:method="post" th:action="@{/register}" th:object="${user}">
        <h2>Please sign in</h2>


        <div> th:if="${message}" class="alert alert-success">
            <p th:text="${message}"></p>
        </div>



        <p>
            <label for="firstName" class="screenreader">First Name</label>
            <input type="text" th:field="*{firstName}" placeholder="First Name" required autofocus>
        </p>

        <p>
        <label for="lastName" class="screenreader">Last Name</label>
        <input type="text" th:field="*{lastName}" placeholder="Last Name" required autofocus>
        </p>

        <p>
            <label for="email" class="screenreader">Email</label>
            <input type="text" th:field="*{email}" placeholder="Email" style="height: auto; width=100%; font-size: 1rem; padding: .5rem; box-sizing: border-box" required autofocus>
        </p>

        <p>
            <label for="password" class="screenreader">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required>
        </p>

        <input th:name="${_csrf.parameterName}" type="hidden" th:value="${_csrf.token}" />
        <button type="submit" class="primary">Register</button>
    </form>
</div>
</body>
</html>
