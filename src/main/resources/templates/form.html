<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form</title>
    <link th:href="@{/css/home.css}" rel="stylesheet">
</head>

<body>
<div class="form-container" id="form-container" th:data-profile-id="${form.id}">
    <div class="form-card">
        <ul>
                <span th:text="${form.firstName}"></span>
                <span th:text="${form.lastName}"></span>
                <span th:text="${form.age}"></span>
                <span th:text="${form.gender}"></span>
                <span th:text="${form.aboutMe}"></span>
                <span th:text="${form.mainPhotoUrl}"></span>
        </ul>
    </div>

    <button id="like_btn">Like</button>
    <button id="dislike_btn">Dislike</button>

</div>

<input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

</body>
<script th:src="@{/js/form/form.js}"></script>
</html>
