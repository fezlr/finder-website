<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form</title>
    <link th:href="@{/css/home.css}" rel="stylesheet">
</head>

<body>
<div class="form-container">
    <div class="form-card">

        <p th:text="${profiles}"></p>


        <ul>
            <li th:each="profile : ${profiles}">
                <span th:text="${profile.firstName}"></span>
            </li>
        </ul>

    </div>
</div>
</body>
</html>
